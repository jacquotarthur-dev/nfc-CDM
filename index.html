<style>

body{
margin:0;

justify-content:center;
align-items:center;
height:100vh;
}

<div id="container"></div>


img,video{
max-width:100%;
max-height:100%;
}

/* supprimer tout scroll */
html, body {
margin:0;
padding:0;
overflow:hidden;
height:100%;
background:black;
}

/* container média plein écran */
#container {
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

#container img,
#container video {
width:100%;
height:100%;
object-fit:cover;
}

/* compteur */
#cooldown{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);

width:33vw;
max-width:400px;

text-align:center;

padding:10px 20px;

background:rgba(0,0,0,0.55);
backdrop-filter:blur(6px);

color:white;
font-family:sans-serif;
font-size:14px;

border-radius:20px;
}

</style>

<body>

  <div id="cooldown">
  Nouveau malaise dans <span id="timer">60</span>s
</div>
  
<div id="container"></div>

<script>


const cooldown = 60000;

const savedMedia = localStorage.getItem("media");
const savedTime = localStorage.getItem("media_time");

const container = document.getElementById("container");
const timerElement = document.getElementById("timer");

function showMedia(file){

container.innerHTML="";

if(file.endsWith(".mp4")){

const video=document.createElement("video");
video.src=file;
video.autoplay=true;
video.loop=true;
video.playsInline=true;
video.controls=true;

container.appendChild(video);

}else{

const img=document.createElement("img");
img.src=file;

container.appendChild(img);

}

}

function startTimer(startTime){

function update(){

const elapsed=Date.now()-startTime;
const remaining=Math.max(0,Math.ceil((cooldown-elapsed)/1000));

timerElement.textContent=remaining;

}

update();

setInterval(update,1000);

}

let mediaToShow;
let startTime;

if(savedMedia && savedTime && (Date.now()-savedTime < cooldown)){

mediaToShow=savedMedia;
startTime=parseInt(savedTime);

}else{

const medias=[];

for(let i=1;i<=195;i++){
medias.push(i+".webp");
}

for(let i=1;i<=68;i++){
medias.push(i+".mp4");
}

mediaToShow=medias[Math.floor(Math.random()*medias.length)];

startTime=Date.now();

localStorage.setItem("media",mediaToShow);
localStorage.setItem("media_time",startTime);

}

showMedia(mediaToShow);
startTimer(startTime);


</script>
