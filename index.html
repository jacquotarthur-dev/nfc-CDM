<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
  

<title>NFC CDM</title>

<link rel="manifest" href="manifest.json">
</head>
<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

img,video{
max-width:100%;
max-height:100%;
}

</style>

<body>

<div id="container"></div>

<script>


// durée du cooldown (60 secondes)
const cooldown = 60000;

// récupérer le média et le temps stockés
const savedMedia = localStorage.getItem("media");
const savedTime = localStorage.getItem("media_time");

// fonction pour afficher un média
function showMedia(file) {
  const container = document.getElementById("container");

  if (file.endsWith(".mp4")) {
    const video = document.createElement("video");
    video.src = file;
    video.autoplay = true;
    video.loop = true;
    video.playsInline = true;
    video.controls = true;
    container.appendChild(video);
  } else {
    const img = document.createElement("img");
    img.src = file;
    container.appendChild(img);
  }
}

// vérifier si le cooldown est actif
if (savedMedia && savedTime && (Date.now() - savedTime < cooldown)) {

  // afficher le même média
  showMedia(savedMedia);

} else {

  // créer la liste des médias
  const medias = [];

  for (let i = 1; i <= 195; i++) {
    medias.push(i + ".webp");
  }

  for (let i = 1; i <= 68; i++) {
    medias.push(i + ".mp4");
  }

  // choisir un média aléatoire
  const random = medias[Math.floor(Math.random() * medias.length)];

  // sauvegarder dans le navigateur
  localStorage.setItem("media", random);
  localStorage.setItem("media_time", Date.now());

  // afficher
  showMedia(random);
}
</script>
