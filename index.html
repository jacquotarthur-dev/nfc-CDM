<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
  

<title>NFC CDM</title>

<link rel="manifest" href="manifest.json">
</head>
<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

img,video{
max-width:100%;
max-height:100%;
}

</style>

<body>

<div id="container"></div>

<script>


// Génération automatique de la liste des fichiers
const medias = [];

// 83 images
for (let i = 1; i <= 143; i++) {
  medias.push(i + ".webp");
}

// 20 vidéos
for (let i = 1; i <= 31; i++) {
  medias.push(i + ".mp4");
}

// Choisir un média aléatoire
const random = medias[Math.floor(Math.random() * medias.length)];

// Récupérer le container (ex: <div id="container"></div>)
const container = document.getElementById("container");

if (random.endsWith(".mp4")) {
  const video = document.createElement("video");
  video.src = random;        // chemin directement à la racine
  video.autoplay = true;
  video.loop = true;
  video.playsInline = true;  // nécessaire pour mobile
  video.controls = true;     // permet à l'utilisateur de lancer le son
  container.appendChild(video);
} else {
  const img = document.createElement("img");
  img.src = random;          // chemin directement à la racine
  container.appendChild(img);
}
</script>
