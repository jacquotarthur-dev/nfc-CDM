<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>NFC CDM</title>

<link rel="manifest" href="manifest.json">
  
<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

img,video{
max-width:100%;
max-height:100%;
}

</style>

</head>

<body>

<div id="container"></div>

<script>


const medias = [
"IMG_20191025_123432.jpg",
"IMG_20191025_123435.jpg",
"IMG_20191028_120854.jpg",
"IMG_20191029_175058.jpg"
];


const random = medias[Math.floor(Math.random() * medias.length)];

const container = document.getElementById("container");

if (random.endsWith(".mp4")) {

let video = document.createElement("video");
video.src = random;
video.autoplay = true;
video.loop = true;
video.muted = true;
video.playsInline = true;

container.appendChild(video);

} else {

let img = document.createElement("img");
img.src = random;

container.appendChild(img);

}

</script>
